# DEPRECATED: Use ai-code-review.yml instead.
# This wrapper keeps backward compatibility for existing callers.
name: AI Security Review

on:
  workflow_call:
    inputs:
      fail_on_critical:
        description: 'Fail the workflow if CRITICAL issues are found'
        type: boolean
        default: true
      fail_on_high:
        description: 'Fail the workflow if HIGH issues are found'
        type: boolean
        default: false
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  security-review:
    uses: ./.github/workflows/ai-code-review.yml
    with:
      fail_on_critical: ${{ inputs.fail_on_critical }}
      fail_on_high: ${{ inputs.fail_on_high }}
      review_scope: 'security'
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
